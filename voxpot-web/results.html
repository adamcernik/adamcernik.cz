<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Voxpot – Výsledky</title>
    <link rel="icon" href="../favicon-16x16.ico" sizes="16x16" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007BFF;
            --primary-light: #e8f2ff;
            --primary-dark: #0056b3;
            --text: #333;
            --text-light: #666;
            --bg: #f9f9f9;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --success: #28a745;
            --success-light: #e8f5e9;
            --error: #dc3545;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --max-width: 720px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Hanken Grotesk", system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header .logo {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.3;
        }

        /* Summary */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--primary);
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.4rem;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: var(--card-bg);
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* Response cards */
        .response-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .response-header {
            padding: 1rem 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            user-select: none;
        }
        .response-header:hover {
            background: #fafafa;
        }
        .response-meta {
            flex: 1;
            min-width: 0;
        }
        .response-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .response-role {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2em 0.6em;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }
        .badge-vedeni {
            background: #fff3e0;
            color: #e65100;
        }
        .badge-prispevatel {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .response-date {
            font-size: 0.75rem;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .chevron {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-light);
        }
        .response-card.open .chevron {
            transform: rotate(180deg);
        }
        .response-body {
            display: none;
            padding: 0 1.25rem 1.25rem;
            border-top: 1px solid var(--border);
        }
        .response-card.open .response-body {
            display: block;
        }

        /* Answer items */
        .answer-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .answer-item:last-child {
            border-bottom: none;
        }
        .answer-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.2rem;
        }
        .answer-value {
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        .answer-value .tag {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-size: 0.8rem;
            padding: 0.15em 0.5em;
            border-radius: 4px;
            margin: 0.15rem 0.25rem 0.15rem 0;
        }

        /* States */
        .loading, .error-msg, .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-light);
        }
        .error-msg {
            color: var(--error);
        }
        .error-msg code {
            display: block;
            background: #f8f8f8;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            text-align: left;
            white-space: pre-wrap;
            color: var(--text);
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 560px) {
            .summary { grid-template-columns: 1fr; }
            .filters { flex-wrap: wrap; }
            .response-date { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Voxpot &times; Adam Cern&iacute;k</div>
        <h1>V&yacute;sledky dotazn&iacute;ku</h1>
    </div>

    <div class="summary" id="summary" style="display:none;">
        <div class="stat-card">
            <div class="number" id="totalCount">0</div>
            <div class="label">Celkem odpov&ecaron;d&iacute;</div>
        </div>
        <div class="stat-card">
            <div class="number" id="vedeniCount">0</div>
            <div class="label">Veden&iacute; / Redakce</div>
        </div>
        <div class="stat-card">
            <div class="number" id="prispevatelCount">0</div>
            <div class="label">P&rcaron;isp&ecaron;vatel&eacute;</div>
        </div>
    </div>

    <div class="filters" id="filters" style="display:none;">
        <button class="filter-btn active" data-filter="all">V&scaron;echny</button>
        <button class="filter-btn" data-filter="vedeni">Veden&iacute;</button>
        <button class="filter-btn" data-filter="prispevatel">P&rcaron;isp&ecaron;vatel&eacute;</button>
    </div>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <div>Na&ccaron;&iacute;t&aacute;m odpov&ecaron;di&hellip;</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://dvjnwjdhefbfunrtmylg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2am53amRoZWZiZnVucnRteWxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MzA2NjgsImV4cCI6MjA4ODAwNjY2OH0.82hWaT8cw97OmwZHQfZfGo-HDhi5U39AYlPxuCbCEQo';

    let supabaseClient = null;
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
        console.warn('Supabase init failed:', e);
    }

    // Human-readable labels for answer keys
    const LABELS = {
        // Common
        name: 'Jm\u00e9no',
        role: 'Role',
        tenure: 'D\u00e9lka p\u016fsoben\u00ed',
        frequency: 'Frekvence psan\u00ed',

        // Vedeni
        planning_process: 'Proces pl\u00e1nov\u00e1n\u00ed \u010dl\u00e1nk\u016f',
        tools: 'N\u00e1stroje',
        tools_other: 'N\u00e1stroje \u2013 jin\u00e9',
        decision_maker: 'Kdo rozhoduje o obsahu',
        planning_horizon: 'Horizont pl\u00e1nov\u00e1n\u00ed',
        planning_pain: 'Co brzd\u00ed p\u0159i pl\u00e1nov\u00e1n\u00ed',
        newsletter_freq: 'Frekvence newsletteru',
        newsletter_owner: 'Kdo p\u0159ipravuje newsletter',
        content_types: 'Dal\u0161\u00ed obsah',
        content_types_other: 'Dal\u0161\u00ed obsah \u2013 jin\u00e9',
        plan_other_content: 'Pl\u00e1novat i dal\u0161\u00ed obsah?',
        org_tasks: 'Organiza\u010dn\u00ed \u00fakoly',
        org_tasks_other: 'Organiza\u010dn\u00ed \u00fakoly \u2013 jin\u00e9',
        org_in_app: 'Co chcete m\u00edt v aplikaci',
        recurring_tasks: 'Opakuj\u00edc\u00ed se \u00fakoly',
        comm_channels: 'Komunika\u010dn\u00ed kan\u00e1ly',
        comm_channels_other: 'Komunika\u010dn\u00ed kan\u00e1ly \u2013 jin\u00e9',
        comm_pain: 'Probl\u00e9my v komunikaci',
        feedback_method: 'Zp\u016fsob zp\u011btn\u00e9 vazby',
        priority: 'Priority (se\u0159azeno)',
        missing_features: 'Co chyb\u00ed v sou\u010dasn\u00fdch n\u00e1stroj\u00edch',
        unwanted_features: 'Co nechcete',
        cms: 'Redak\u010dn\u00ed syst\u00e9m / CMS',
        integrations: 'U\u017eite\u010dn\u00e9 integrace',
        anything_else: 'Dal\u0161\u00ed pozn\u00e1mky',
        interview: 'Ochota z\u00fa\u010dastnit se rozhovoru',

        // Prispevatel
        writing_process: 'Proces psan\u00ed \u010dl\u00e1nku',
        p_tools: 'N\u00e1stroje',
        p_tools_other_text: 'N\u00e1stroje \u2013 jin\u00e9',
        work_pain: 'Co zdr\u017euje nebo frustruje',
        p_comm: 'Komunikace s redakc\u00ed',
        p_comm_other_text: 'Komunikace \u2013 jin\u00e9',
        clarity: 'Jasnost o\u010dek\u00e1v\u00e1n\u00ed',
        p_wishes: 'Co by nejv\u00edc pomohlo',
        p_wishes_other_text: 'P\u0159\u00e1n\u00ed \u2013 jin\u00e9',
        unwanted: 'Co nechcete',
    };

    // Readable values for select/radio options
    const VALUE_LABELS = {
        '<1': 'M\u00e9n\u011b ne\u017e rok',
        '1-3': '1\u20133 roky',
        '3+': 'V\u00edce ne\u017e 3 roky',
        regular: 'Pravideln\u011b',
        occasional: 'N\u00e1razov\u011b',
        daily: 'Den',
        weekly: 'T\u00fdden',
        biweekly: 'Dvakr\u00e1t m\u011bs\u00ed\u010dn\u011b',
        monthly: 'M\u011bs\u00edc',
        quarterly: '\u010ctvrtlet\u00ed',
        irregular: 'Nepravideln\u011b',
        none: '\u017d\u00e1dn\u00fd / Nepl\u00e1nujeme',
        yes: 'Ano',
        no: 'Ne',
        nice_to_have: 'Bylo by fajn',
        always: 'V\u017edy',
        mostly: 'V\u011bt\u0161inou',
        sometimes: 'Ob\u010das',
        rarely: 'Z\u0159\u00eddka',
        // Tool / checkbox values
        google_docs: 'Google Docs',
        google_sheets: 'Google Sheets',
        task_manager: 'Task manager',
        messaging: 'Messaging',
        email: 'E-mail',
        meetings: 'Sch\u016fzky',
        contacts: 'Kontakty',
        invoicing: 'Fakturace',
        documents: 'Dokumenty',
        office: 'Kancel\u00e1\u0159',
        onboarding: 'Onboarding',
        slack: 'Slack',
        whatsapp: 'WhatsApp',
        video: 'Video hovory',
        in_person: 'Osobn\u011b',
        podcast: 'Podcast',
        social: 'Soci\u00e1ln\u00ed s\u00edt\u011b',
        press: 'Tiskov\u00e9 zpr\u00e1vy',
        article_status: 'Stav \u010dl\u00e1nku',
        calendar: 'Kalend\u00e1\u0159',
        tasks: '\u00dakoly',
        comments: 'Koment\u00e1\u0159e',
        org: 'Organizace',
        stats: 'Statistiky',
        deadlines: 'Deadlines',
        communication: 'Komunikace',
        team_overview: 'P\u0159ehled t\u00fdmu',
        pub_calendar: 'Publika\u010dn\u00ed kalend\u00e1\u0159',
        other: 'Jin\u00e9',
    };

    let allResponses = [];
    let activeFilter = 'all';

    async function loadData() {
        const contentEl = document.getElementById('content');

        if (!supabaseClient) {
            contentEl.innerHTML = '<div class="error-msg">Supabase se nepoda\u0159ilo inicializovat.</div>';
            return;
        }

        const { data, error } = await supabaseClient
            .from('survey_responses')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            contentEl.innerHTML = `
                <div class="error-msg">
                    Nepoda\u0159ilo se na\u010d\u00edst data. Pravd\u011bpodobn\u011b je t\u0159eba povolit anonymn\u00ed \u010dten\u00ed v Supabase.
                    <code>CREATE POLICY "Allow anon reads"\n  ON survey_responses\n  FOR SELECT\n  TO anon\n  USING (true);</code>
                </div>`;
            return;
        }

        allResponses = data || [];
        updateSummary();
        renderResponses();

        document.getElementById('summary').style.display = '';
        document.getElementById('filters').style.display = '';
    }

    function updateSummary() {
        const vedeni = allResponses.filter(r => r.version === 'vedeni');
        const prisp = allResponses.filter(r => r.version === 'prispevatel');
        document.getElementById('totalCount').textContent = allResponses.length;
        document.getElementById('vedeniCount').textContent = vedeni.length;
        document.getElementById('prispevatelCount').textContent = prisp.length;
    }

    function renderResponses() {
        const contentEl = document.getElementById('content');
        const filtered = activeFilter === 'all'
            ? allResponses
            : allResponses.filter(r => r.version === activeFilter);

        if (filtered.length === 0) {
            contentEl.innerHTML = '<div class="empty">\u017d\u00e1dn\u00e9 odpov\u011bdi' +
                (activeFilter !== 'all' ? ' v t\u00e9to kategorii' : '') + '.</div>';
            return;
        }

        contentEl.innerHTML = filtered.map(r => renderCard(r)).join('');

        contentEl.querySelectorAll('.response-header').forEach(header => {
            header.addEventListener('click', () => {
                header.closest('.response-card').classList.toggle('open');
            });
        });
    }

    function renderCard(r) {
        const name = r.respondent_name || 'Anonymn\u00ed';
        const role = r.role || '\u2014';
        const badgeClass = r.version === 'vedeni' ? 'badge-vedeni' : 'badge-prispevatel';
        const badgeText = r.version === 'vedeni' ? 'Veden\u00ed' : 'P\u0159isp\u011bvatel';
        const date = new Date(r.created_at).toLocaleDateString('cs-CZ', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const answers = r.answers || {};
        const answerHTML = Object.entries(answers)
            .filter(([key]) => key !== 'name' && key !== 'role')
            .map(([key, val]) => renderAnswer(key, val))
            .join('');

        return `
            <div class="response-card">
                <div class="response-header">
                    <div class="response-meta">
                        <div class="response-name">${esc(name)}</div>
                        <div class="response-role">${esc(role)}</div>
                    </div>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                    <span class="response-date">${date}</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="response-body">${answerHTML || '<div class="answer-item"><div class="answer-value" style="color:var(--text-light)">\u017d\u00e1dn\u00e9 dal\u0161\u00ed odpov\u011bdi</div></div>'}</div>
            </div>`;
    }

    function renderAnswer(key, val) {
        const label = LABELS[key] || key;

        if (Array.isArray(val)) {
            const tags = val.map(v => `<span class="tag">${esc(VALUE_LABELS[v] || v)}</span>`).join('');
            return `<div class="answer-item"><div class="answer-label">${esc(label)}</div><div class="answer-value">${tags}</div></div>`;
        }

        const displayVal = VALUE_LABELS[val] || val;
        return `<div class="answer-item"><div class="answer-label">${esc(label)}</div><div class="answer-value">${esc(String(displayVal))}</div></div>`;
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            renderResponses();
        });
    });

    loadData();
</script>
</body>
</html>
